{% extends 'base.html' %}
{% block title %}Join · Little Posts{% endblock %}
{% block content %}
  <section class="auth-card card">
    <p class="eyebrow">Join the conversation</p><h1>Create your account</h1>
    <form method="post" class="stacked-form">
      <label for="username">Username</label><input id="username" name="username" minlength="3" maxlength="30" autocomplete="username" required autofocus>
      <label for="email">Email</label><input id="email" name="email" type="email" maxlength="254" autocomplete="email" required>
      <label for="password">Password</label><input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required><small>Use at least 8 characters.</small>
      <button class="button" type="submit">Create account</button>
    </form>
    <p class="form-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a>.</p>
  </section>
{% endblock %}
