<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Little Posts{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ url_for('feed') }}" aria-label="Little Posts home">Little Posts</a>
      <nav aria-label="Account navigation">
        {% if current_user %}
          <span class="welcome">Hi, {{ current_user['username'] }}</span>
          <form action="{{ url_for('logout') }}" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button class="text-button" type="submit">Log out</button>
          </form>
        {% else %}
          <a href="{{ url_for('login') }}">Log in</a>
          <a class="button button-small" href="{{ url_for('register') }}">Join</a>
        {% endif %}
      </nav>
    </header>
    <main class="page-shell">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}" role="status">{{ message }}</div>
        {% endfor %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </body>
</html>
