{% extends 'base.html' %}
{% block title %}Log in · Little Posts{% endblock %}
{% block content %}
  <section class="auth-card card">
    <p class="eyebrow">Welcome back</p><h1>Log in</h1>
    <form method="post" class="stacked-form">
      <label for="identity">Username or email</label><input id="identity" name="identity" autocomplete="username" required autofocus>
      <label for="password">Password</label><input id="password" name="password" type="password" autocomplete="current-password" required>
      <button class="button" type="submit">Log in</button>
    </form>
    <p class="form-switch">New here? <a href="{{ url_for('register') }}">Create an account</a>.</p>
  </section>
{% endblock %}
