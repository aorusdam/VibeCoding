<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Playfair+Display:wght@600&family=Montserrat:wght@600&family=Roboto:wght@500&family=Pacifico&family=Oswald:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #020617, #1e293b);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
      padding: 2rem;
    }

    .wrapper {
      width: min(600px, 100%);
      padding: 2rem;
      border-radius: 24px;
      background: var(--card);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      animation: fadeInUp 1.2s ease-out;
    }

    h1 {
      margin: 0 0 1.5rem;
      text-align: center;
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-family: 'Fredoka', sans-serif;
      letter-spacing: 1px;
      animation: titleFade 1.4s ease-out;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    li {
      opacity: 0;
      transform: translateX(-80px);
      animation: slideInLeft 0.9s ease forwards;
      border-radius: 16px;
      padding: 1rem 1.2rem;
      background: rgba(255,255,255,0.12);
      transition: transform 0.3s ease, background 0.3s ease;
    }

    li:hover {
      transform: translateY(-4px) scale(1.01);
      background: rgba(255,255,255,0.18);
    }

    li:nth-child(1) {
      animation-delay: 0.3s;
      font-family: 'Playfair Display', serif;
      animation-name: slideInFromLeft;
    }

    li:nth-child(2) {
      animation-delay: 0.7s;
      font-family: 'Pacifico', cursive;
      animation-name: slideInFromRight;
    }

    li:nth-child(3) {
      animation-delay: 1.1s;
      font-family: 'Roboto', sans-serif;
      animation-name: slideInFromTop;
    }

    a {
      display: block;
      color: var(--text);
      text-decoration: none;
      font-size: 1.1rem;
      position: relative;
      transition: color 0.3s ease;
      animation: fadeInText 1s ease forwards;
    }

    a:hover {
      color: var(--accent);
    }

    @keyframes titleFade {
      from {
        opacity: 0;
        transform: translateY(-24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInFromLeft {
      0% {
        opacity: 0;
        transform: translateX(-120px);
      }
      70% {
        opacity: 1;
        transform: translateX(12px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideInFromRight {
      0% {
        opacity: 0;
        transform: translateX(140px);
      }
      70% {
        opacity: 1;
        transform: translateX(-10px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideInFromTop {
      0% {
        opacity: 0;
        transform: translateY(-80px);
      }
      70% {
        opacity: 1;
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInText {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Animated Projects</h1>
    <ul>
      <li><a href="web/simple_web/">Simple Web</a></li>
      <li><a href="web2/dad-jokes/">Dad Jokes</a></li>
      <li><a href="index.html">Home</a></li>
    </ul>
  </div>
</body>
</html>
